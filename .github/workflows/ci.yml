name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 06:00 UTC — catch upstream package regressions
    - cron: '0 6 * * 1'

jobs:
  # ─── Script quality ─────────────────────────────────────────────
  shell-lint:
    name: ShellCheck + shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: shfmt --diff
        run: |
          files=$(shfmt -f .)
          [ -z "$files" ] && { echo "no shell files"; exit 0; }
          shfmt -d -i 4 -ci $files

  # ─── Integration tests ──────────────────────────────────────────
  ubuntu-workstation:
    name: Ubuntu 24.04 — content/dev-workstation-ubuntu/install.sh
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Prep container
        run: |
          apt-get update -qq
          apt-get install -y -qq sudo curl ca-certificates
          useradd -m -G sudo tester
          echo 'tester ALL=(ALL) NOPASSWD:ALL' >> /etc/sudoers

      - name: Run dev-workstation.sh
        run: |
          chmod +x content/dev-workstation-ubuntu/install.sh
          su tester -c "cd $GITHUB_WORKSPACE && bash content/dev-workstation-ubuntu/install.sh"

      - name: Verify tools installed
        run: |
          set -e
          fail=0
          for bin in git node rg fd nvim tmux jq bat; do
            if command -v "$bin" >/dev/null; then
              echo "  ok  $bin"
            else
              echo "  MISSING  $bin"; fail=1
            fi
          done
          [ "$fail" -eq 0 ]

  fedora-hardening:
    name: Fedora — content/fedora-hardening/harden.sh
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Prep container
        # Install deps the hardening script assumes exist on a real server
        # (sshd_config, sestatus, stat, sed, etc. — minimal set for declarative checks).
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            openssh-server sudo which procps-ng shadow-utils libselinux-utils

      - name: Run hardening (systemd-dependent steps tolerated in container)
        run: |
          chmod +x content/fedora-hardening/harden.sh
          # Drop `set -e` so `systemctl enable --now firewalld` etc. failing
          # inside a container doesn't stop later declarative sections running.
          sed -i 's/^set -euo pipefail$/set -uo pipefail/' content/fedora-hardening/harden.sh
          bash content/fedora-hardening/harden.sh || true

      - name: Verify hardening artifacts landed
        run: |
          set -e
          fail=0
          check() { grep -q "$2" "$1" && echo "  ok  $3" || { echo "  MISSING  $3"; fail=1; }; }

          check /etc/ssh/sshd_config                      '^PermitRootLogin no'               "SSH: PermitRootLogin no"
          check /etc/ssh/sshd_config                      '^PasswordAuthentication no'        "SSH: PasswordAuthentication no"
          check /etc/ssh/sshd_config                      '^MaxAuthTries 3'                   "SSH: MaxAuthTries 3"
          check /etc/security/pwquality.conf              '^minlen = 14'                      "pwquality: minlen 14"
          check /etc/security/faillock.conf               '^deny = 5'                         "faillock: deny 5"
          check /etc/sysctl.d/99-hardening.conf           '^kernel.randomize_va_space = 2'    "sysctl: ASLR"
          check /etc/sysctl.d/99-hardening.conf           '^net.ipv4.tcp_syncookies = 1'      "sysctl: SYN cookies"
          check /etc/modprobe.d/hardening-blacklist.conf  '^install dccp'                     "modprobe: dccp blacklisted"
          check /etc/audit/rules.d/99-hardening.rules     '^-w /etc/passwd'                   "auditd: /etc/passwd watched"
          check /etc/login.defs                           '^PASS_MAX_DAYS   90'               "login.defs: PASS_MAX_DAYS 90"

          [ "$(stat -c %a /etc/shadow)" = "600" ] && echo "  ok  /etc/shadow 600" || { echo "  MISSING  /etc/shadow 600"; fail=1; }

          [ "$fail" -eq 0 ]
